services:

  localstack:
    image: localstack/localstack-pro:latest
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
      - SERVICES=s3,sqs,lambda,ecr,iam
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  terraform:
    image: hashicorp/terraform:1.6
    working_dir: /workspace
    volumes:
      - ./infrastructure-dh:/workspace
      - ./.aws:/root/.aws:ro
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - TARGET_ENV=${TARGET_ENV:-localstack}
      - TF_ENDPOINT=${TF_ENDPOINT:-http://localstack:4566}
    profiles:
      - localstack
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["/bin/sh"]
    command: ["-c", "while true; do sleep 30; done"]

  aws-cli:
    image: amazon/aws-cli:latest
    working_dir: /workspace
    volumes:
      - ./infrastructure-dh:/workspace
      - ./.aws:/root/.aws:ro
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ENDPOINT_URL=${TF_ENDPOINT:-http://localstack:4566}
    entrypoint: ["aws"]

volumes:
  localstack-data:
