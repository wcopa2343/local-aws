services:

  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,lambda,ecr,iam
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - floci-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - floci
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  terraform:
    image: hashicorp/terraform:1.6
    working_dir: /workspace
    volumes:
      - ./infrastructure-dh:/workspace
      - ./.aws:/root/.aws:ro
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - TARGET_ENV=${TARGET_ENV:-floci}
      - TF_ENDPOINT=${TF_ENDPOINT:-http://floci:4566}
    profiles:
      - floci
    depends_on:
      floci:
        condition: service_healthy
    entrypoint: ["/bin/sh"]
    command: ["-c", "while true; do sleep 30; done"]

  aws-cli:
    image: amazon/aws-cli:latest
    working_dir: /workspace
    volumes:
      - ./infrastructure-dh:/workspace
      - ./lambdas-code:/workspace/lambdas-code
      - ./.aws:/root/.aws:ro
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ENDPOINT_URL=${TF_ENDPOINT:-http://floci:4566}
    # entrypoint: ["/bin/sh"]
    # tty: true
    # stdin_open: true

volumes:
  floci-data:
